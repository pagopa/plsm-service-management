name: CI - Ask Me Anything Function

on:
  
  workflow_dispatch:
  push:
    branches:
      # - develop
      # - feature/**
      - '**'
    paths:
      - "apps/sm-ask-me-fn/**"
  pull_request:
    branches:
      - develop
    paths:
      - "apps/sm-ask-me-fn/**"

permissions:
  contents: read
  id-token: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22

      - name: Enable Corepack & set Yarn version
        run: |
          corepack enable
          corepack prepare yarn@4.10.3 --activate

      - name: Cache Yarn dependencies
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            .yarn/cache
            .yarn/install-state.gz
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install dependencies with Yarn
        run: yarn install --immutable

      - name: Run linter with Turbo
        run: yarn turbo lint --filter=sm-ask-me-fn

      - name: Run tests with Turbo
        run: yarn turbo test --filter=sm-ask-me-fn

      - name: Build app with Turbo
        run: yarn turbo build --filter=sm-ask-me-fn
