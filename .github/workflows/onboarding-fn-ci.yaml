name: CI - Onboarding Function

on:
  workflow_dispatch:
  push:
    branches:
      # - develop
      # - feature/**
      - '**'
    paths:
      - "apps/sm-onboarding-fn/**"
  pull_request:
    branches:
      - develop
    paths:
      - "apps/sm-onboarding-fn/**"

permissions:
  contents: read
  id-token: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22

      - name: Enable Corepack & set Yarn version
        run: |
          corepack enable
          corepack prepare yarn@4.10.3 --activate

      - name: Cache Yarn dependencies
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            .yarn/cache
            .yarn/install-state.gz
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install dependencies with Yarn
        run: yarn install --immutable

      - name: Generate types for sm-onboarding-fn
        run: |
          yarn workspace sm-onboarding-fn generate:avro

      - name: Run linter with Turbo
        run: yarn turbo lint --filter=sm-onboarding-fn

      - name: Run tests with Turbo
        run: yarn turbo test --filter=sm-onboarding-fn

      - name: Build app with Turbo
        run: yarn turbo build --filter=sm-onboarding-fn
