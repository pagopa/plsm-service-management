name: Set Key Vault Secret

on:
  workflow_dispatch:
    inputs:
      secret_name:
        description: 'Nome del segreto (formato: kebab-case, es. my-secret-key)'
        required: true
        type: string
      secret_value:
        description: 'Valore del segreto'
        required: true
        type: string
      environment:
        description: 'Ambiente target'
        required: true
        type: choice
        options:
          - dev
          - prod
      allow_overwrite:
        description: 'Permetti sovrascrittura se il segreto esiste già (default: false)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  set-secret:
    runs-on: ubuntu-latest
    environment: infra-${{ inputs.environment }}

    steps:
      - name: Mask secret value
        run: echo "::add-mask::${{ inputs.secret_value }}"

      - name: Validate inputs
        run: |
          if [[ ! "${{ inputs.secret_name }}" =~ ^[a-zA-Z][a-zA-Z0-9-]*[a-zA-Z0-9]$ ]]; then
            echo "::error::Nome non valido. Usa solo lettere, numeri e trattini (es. my-secret-key)"
            exit 1
          fi
          if [[ "${{ inputs.secret_name }}" =~ -- ]]; then
            echo "::error::Il nome non può contenere trattini consecutivi"
            exit 1
          fi
          if [[ -z "${{ inputs.secret_value }}" ]]; then
            echo "::error::Il valore del segreto non può essere vuoto"
            exit 1
          fi

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Set Key Vault name
        run: |
          if [[ "${{ inputs.environment }}" == "prod" ]]; then
            echo "KV_NAME=plsm-p-itn-common-kv-01" >> $GITHUB_ENV
          else
            echo "KV_NAME=plsm-d-itn-common-kv-01" >> $GITHUB_ENV
          fi

      - name: Check existing secret
        run: |
          EXISTS=$(az keyvault secret show \
            --vault-name "$KV_NAME" \
            --name "${{ inputs.secret_name }}" \
            --query "name" -o tsv 2>/dev/null || echo "")
          if [[ -n "$EXISTS" && "${{ inputs.allow_overwrite }}" != "true" ]]; then
            echo "::error::Il segreto '${{ inputs.secret_name }}' esiste già in $KV_NAME. Imposta 'allow_overwrite: true' per sovrascriverlo."
            exit 1
          fi

      - name: Set Key Vault secret
        run: |
          az keyvault secret set \
            --vault-name "$KV_NAME" \
            --name "${{ inputs.secret_name }}" \
            --value "${{ inputs.secret_value }}"

      - name: Summary
        run: |
          echo "### Segreto impostato con successo" >> $GITHUB_STEP_SUMMARY
          echo "- **Nome:** \`${{ inputs.secret_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **KV:** \`$KV_NAME\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Ambiente:** \`${{ inputs.environment }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Avviato da:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY

      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          STATUS="${{ job.status }}"
          COLOR=$([[ "$STATUS" == "success" ]] && echo "good" || echo "danger")
          curl -s -X POST "$SLACK_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"attachments\": [{
                \"color\": \"$COLOR\",
                \"title\": \"Key Vault secret $STATUS\",
                \"text\": \"*Nome:* \`${{ inputs.secret_name }}\`\\n*Ambiente:* \`${{ inputs.environment }}\`\\n*KV:* \`$KV_NAME\`\\n*Avviato da:* ${{ github.actor }}\"
              }]
            }"
