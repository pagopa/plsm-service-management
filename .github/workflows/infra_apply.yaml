name: Infra Apply

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: 'Seleziona l''ambiente di deploy'
        required: true
        default: 'prod'
        type: choice
        options:
          - dev
          - dev-base
          - prod
      confirm:
        description: 'Scrivi "apply" per confermare'
        required: true
        type: string

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  apply_prod:
    if: github.event.inputs.target_env == 'prod'
    uses: pagopa/dx/.github/workflows/infra_apply.yaml@main
    name: Apply Infrastructure - prod
    secrets: inherit
    with:
      environment: prod
      base_path: infra/resources
      use_private_agent: true
      override_github_environment: infra-prod

  apply_dev:
    if: github.event.inputs.target_env == 'dev'
    uses: pagopa/dx/.github/workflows/infra_apply.yaml@main
    name: Apply Infrastructure - dev
    secrets: inherit
    with:
      environment: dev
      base_path: infra/resources
      use_private_agent: true
      override_github_environment: infra-dev

  apply_dev_base:
    if: github.event.inputs.target_env == 'dev-base'
    uses: pagopa/dx/.github/workflows/infra_apply.yaml@main
    name: Apply Infrastructure - dev-base
    secrets: inherit
    with:
      environment: dev-base
      base_path: infra/resources
      use_private_agent: true
      override_github_environment: infra-dev
