name: Infra Apply

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "infra/resources/prod/**"
      - "infra/resources/_modules/**"
      - "infra/resources/environments/**"
      - ".github/workflows/infra_apply.yaml"

permissions:
  contents: read
  id-token: write

jobs:
  apply_prod:
    uses: pagopa/dx/.github/workflows/infra_apply.yaml@main
    name: Apply Infrastructure - Production
    secrets: inherit
    with:
      environment: app-prod-cd
      base_path: infra/resources
      use_private_agent: true
