name: Infra Apply

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: "Seleziona l'ambiente di deploy"
        required: true
        default: "prod"
        type: choice
        options:
          - dev
          - prod
      confirm:
        description: 'Scrivi "apply" per confermare'
        required: true
        type: string
  push:
    branches:
      - main
    paths:
      - "infra/resources/prod/**"
      - "infra/resources/_modules/**"
      - "infra/resources/environments/**"

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  # Check if branch is allowed to apply
  check_branch:
    runs-on: ubuntu-latest
    outputs:
      allowed: ${{ steps.check.outputs.allowed }}
    steps:
      - name: Check branch name
        id: check
        run: |
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          echo "Current branch: $BRANCH_NAME"

          # Allow apply only from:
          # - main branch (auto-apply on merge)
          # - infra/* branches (manual workflow_dispatch)
          if [[ "$BRANCH_NAME" == "main" ]] || [[ "$BRANCH_NAME" == infra/* ]]; then
            echo "✅ Branch allowed to apply infrastructure"
            echo "allowed=true" >> $GITHUB_OUTPUT
          else
            echo "❌ Branch NOT allowed to apply infrastructure"
            echo "⚠️  Only 'main' or 'infra/*' branches can apply changes"
            echo "allowed=false" >> $GITHUB_OUTPUT
            exit 1
          fi

  apply_prod:
    needs: check_branch
    if: needs.check_branch.outputs.allowed == 'true'
    uses: pagopa/dx/.github/workflows/infra_apply.yaml@main
    name: Apply Infrastructure - ${{ github.event.inputs.target_env || 'prod' }}
    secrets: inherit
    with:
      environment: ${{ github.event.inputs.target_env || 'prod' }}
      base_path: infra/resources
      use_private_agent: true
      override_github_environment: infra-${{ github.event.inputs.target_env || 'prod' }}
