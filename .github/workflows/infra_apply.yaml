name: Infra Apply

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: 'Seleziona l''ambiente di deploy'
        required: true
        default: 'prod'
        type: choice
        options:
          - dev
          - prod
      confirm:
        description: 'Scrivi "apply" per confermare'
        required: true
        type: string

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  apply_prod:
    uses: pagopa/dx/.github/workflows/infra_apply.yaml@main
    name: Apply Infrastructure - ${{ github.event.inputs.target_env }}
    secrets: inherit
    with:
      environment: ${{ github.event.inputs.target_env }}
      base_path: infra/resources
      use_private_agent: true
      override_github_environment: infra-${{ github.event.inputs.target_env }}
