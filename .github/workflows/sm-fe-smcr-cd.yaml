name: CD - SM-FE-SMCR

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Ambiente di deploy
        type: choice
        required: true
        default: app-prod
        options:
          - app-prod
          - app-dev

      disable_auto_staging_deploy:
        description: Disabilita il deploy automatico sullo slot staging
        type: boolean
        required: false
        default: false

permissions:
  id-token: write
  contents: read

env:
  NODE_VERSION: "22"
  WORKSPACE_NAME: sm-fe-smcr
  NEXT_APP_PATH: ./apps/sm-fe-smcr
  BUNDLE_NAME: bundle
  BUILD_DIR: bundle-root
  # Derivati automaticamente dall'ambiente selezionato
  RESOURCE_GROUP_NAME: ${{ inputs.environment == 'app-prod' && 'plsm-p-itn-apps-rg-01' || 'plsm-d-itn-apps-rg-01' }}
  WEB_APP_NAME: ${{ inputs.environment == 'app-prod' && 'plsm-p-itn-fe-smcr-app-01' || 'plsm-d-itn-fe-smcr-app-01' }}
  # Label del runner privato per l'ambiente selezionato
  RUNNER_LABEL: ${{ inputs.environment == 'app-prod' && 'prod' || 'dev' }}

jobs:
  # --------------------------------------------------------------------
  # BUILD & PACKAGE
  # I NEXT_PUBLIC_* vengono dai secrets dell'environment selezionato
  # (app-prod o app-dev) — NON dai repo secrets globali
  # --------------------------------------------------------------------
  build:
    name: Build & Package Artifact
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    env:
      NEXT_PUBLIC_MSAL_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_MSAL_CLIENT_ID }}
      NEXT_PUBLIC_MSAL_TENANT_ID: ${{ secrets.NEXT_PUBLIC_MSAL_TENANT_ID }}
      NEXT_PUBLIC_MSAL_REDIRECT_URI: ${{ secrets.NEXT_PUBLIC_MSAL_REDIRECT_URI }}
      NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
      MSAL_CLIENT_ID: ${{ secrets.MSAL_CLIENT_ID }}
      MSAL_TENANT_ID: ${{ secrets.MSAL_TENANT_ID }}
      MSAL_REDIRECT_URI: ${{ secrets.MSAL_REDIRECT_URI }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build (Turbo - monorepo)
        run: yarn turbo build --filter=${{ env.WORKSPACE_NAME }}

      - name: Create Standalone Bundle Directory
        run: |
          rm -rf $BUILD_DIR
          mkdir -p $BUILD_DIR
          cp -R $NEXT_APP_PATH/.next/standalone/$NEXT_APP_PATH/. $BUILD_DIR/

      - name: Copy Standalone Node Modules
        run: |
          NODE_MODULES_SRC="$NEXT_APP_PATH/.next/standalone/node_modules"
          if [ -d "$NODE_MODULES_SRC" ]; then
              cp -R $NODE_MODULES_SRC $BUILD_DIR/
          else
              echo "AVVISO: Node_modules standalone non trovato in $NODE_MODULES_SRC."
          fi

      - name: Copy Static Assets (.next/static)
        run: |
          STATIC_SRC="$NEXT_APP_PATH/.next/static"
          STATIC_DEST="$BUILD_DIR/.next/static"
          if [ -d "$STATIC_SRC" ]; then
            mkdir -p $STATIC_DEST
            cp -R $STATIC_SRC/* $STATIC_DEST/
          fi

      - name: Copy Public Directory
        run: |
          PUBLIC_SRC="$NEXT_APP_PATH/public"
          if [ -d "$PUBLIC_SRC" ]; then
            cp -R $PUBLIC_SRC $BUILD_DIR/
          fi

      - name: Create Deployment ZIP
        run: |
          cd $BUILD_DIR
          zip -r ../${BUNDLE_NAME}.zip .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BUNDLE_NAME }}
          path: ${{ env.BUNDLE_NAME }}.zip
          retention-days: 7

  # --------------------------------------------------------------------
  # VALIDATE WEB APP
  # Usa l'environment -ci per le credenziali Azure (ARM_*)
  # --------------------------------------------------------------------
  validate:
    name: Validate Web App Configuration
    needs: build
    runs-on: ${{ inputs.environment == 'app-prod' && 'prod' || 'dev' }}
    environment: ${{ inputs.environment }}-ci

    permissions:
      id-token: write

    outputs:
      use_staging_slot: ${{ steps.query-staging-slot.outputs.use_staging_slot }}

    steps:
      - name: Azure Login
        uses: azure/login@a65d910e8af852a8061c627c456678983e180302 # v2.2.0
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Check for existing staging slot
        id: query-staging-slot
        run: |
          if [ "${{ inputs.disable_auto_staging_deploy }}" == "true" ]; then
            echo "use_staging_slot=false" >> "$GITHUB_OUTPUT"
            echo "### ⚠️ Staging slot disabilitato via input" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi
          USE_STAGING_SLOT=$(az webapp deployment slot list \
            --resource-group "${{ env.RESOURCE_GROUP_NAME }}" \
            --name "${{ env.WEB_APP_NAME }}" \
            --query 'length([?name == `staging`]) > `0`')
          echo "use_staging_slot=$USE_STAGING_SLOT" >> "$GITHUB_OUTPUT"
          if [ "$USE_STAGING_SLOT" == "true" ]; then
            echo "### ✅ Staging slot trovato — deploy → staging → swap" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ⚠️ Staging slot non trovato — deploy diretto in produzione" >> $GITHUB_STEP_SUMMARY
          fi

  # --------------------------------------------------------------------
  # DEPLOY (staging o production)
  # --------------------------------------------------------------------
  deploy:
    name: ${{ fromJSON(needs.validate.outputs.use_staging_slot) && 'Deploy to Staging' || 'Deploy to Production' }}
    needs: [validate]
    runs-on: ${{ inputs.environment == 'app-prod' && 'prod' || 'dev' }}
    environment: ${{ inputs.environment }}-cd

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ env.BUNDLE_NAME }}
          path: .

      - name: Azure Login
        uses: azure/login@a65d910e8af852a8061c627c456678983e180302 # v2.2.0
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Deploy to staging slot
        if: fromJSON(needs.validate.outputs.use_staging_slot)
        uses: azure/webapps-deploy@4bfb30bef2c330e36be280cb1e5726d0fac06233 # v2.2.13
        with:
          app-name: ${{ env.WEB_APP_NAME }}
          slot-name: staging
          package: ${{ env.BUNDLE_NAME }}.zip

      - name: Deploy to production slot
        if: ${{ !fromJSON(needs.validate.outputs.use_staging_slot) }}
        uses: azure/webapps-deploy@4bfb30bef2c330e36be280cb1e5726d0fac06233 # v2.2.13
        with:
          app-name: ${{ env.WEB_APP_NAME }}
          package: ${{ env.BUNDLE_NAME }}.zip

  # --------------------------------------------------------------------
  # SWAP → PRODUCTION
  # --------------------------------------------------------------------
  swap:
    name: Swap Staging → Production
    needs: [validate, deploy]
    if: ${{ fromJSON(needs.validate.outputs.use_staging_slot) }}
    runs-on: ${{ inputs.environment == 'app-prod' && 'prod' || 'dev' }}
    environment: ${{ inputs.environment }}-cd

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Azure Login
        uses: azure/login@a65d910e8af852a8061c627c456678983e180302 # v2.2.0
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Swap staging → production
        run: |
          az webapp deployment slot swap \
            --resource-group "${{ env.RESOURCE_GROUP_NAME }}" \
            --name "${{ env.WEB_APP_NAME }}" \
            --slot staging \
            --target-slot production

      - name: Verify production deployment
        run: |
          echo "⏳ Waiting 30s for production slot to stabilize..."
          sleep 30
          PROD_URL="https://${{ env.WEB_APP_NAME }}.azurewebsites.net"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$PROD_URL" || echo "000")
          echo "Production URL: $PROD_URL — HTTP Status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" -eq 200 ] || [ "$HTTP_STATUS" -eq 302 ]; then
            echo "### ✅ Deployment Successful — $PROD_URL (HTTP $HTTP_STATUS)" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ⚠️ Verify manually — $PROD_URL (HTTP $HTTP_STATUS)" >> $GITHUB_STEP_SUMMARY
          fi
