name: Infra Plan

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: "Seleziona l'ambiente di deploy"
        required: true
        default: "prod"
        type: choice
        options:
          - dev
          - dev-base
          - prod
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - "infra/resources/prod/**"
      - "infra/resources/_modules/**"
      - "infra/resources/environments/**"
      - ".github/workflows/infra_plan.yaml"
      - ".github/workflows/infra_apply.yaml"

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  plan_prod:
    if: github.event_name == 'pull_request' || github.event.inputs.target_env == 'prod'
    uses: pagopa/dx/.github/workflows/infra_plan.yaml@main
    name: Plan Infrastructure - ${{ github.event.inputs.target_env || 'prod' }}
    secrets: inherit
    with:
      environment: ${{ github.event.inputs.target_env || 'prod' }}
      base_path: infra/resources
      use_private_agent: true
      use_labels: true
      override_github_environment: infra-${{ github.event.inputs.target_env || 'prod' }}

  plan_dev:
    if: github.event.inputs.target_env == 'dev'
    uses: pagopa/dx/.github/workflows/infra_plan.yaml@main
    name: Plan Infrastructure - dev
    secrets: inherit
    with:
      environment: dev
      base_path: infra/resources
      use_private_agent: true
      use_labels: true
      override_github_environment: infra-dev

  plan_dev_base:
    if: github.event.inputs.target_env == 'dev-base'
    uses: pagopa/dx/.github/workflows/infra_plan.yaml@main
    name: Plan Infrastructure - dev-base
    secrets: inherit
    with:
      environment: dev-base
      base_path: infra/resources
      use_private_agent: true
      use_labels: true
      # dev-base shares the infra-dev GitHub Environment (no dedicated infra-dev-base exists)
      override_github_environment: infra-dev
