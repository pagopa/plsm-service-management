name: Infra Plan

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - "infra/resources/prod/**"
      - "infra/resources/_modules/**"
      - "infra/resources/environments/**"
      - ".github/workflows/infra_plan.yaml"
      - ".github/workflows/infra_apply.yaml"

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  plan_prod:
    uses: pagopa/dx/.github/workflows/infra_plan.yaml@main
    name: Plan Infrastructure - Production
    secrets: inherit
    with:
      environment: app-prod-ci
      base_path: infra/resources
      use_private_agent: true
