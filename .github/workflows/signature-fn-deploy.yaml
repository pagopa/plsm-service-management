name: CD - Signature Function

on:
  workflow_dispatch:
    inputs:
      use_staging_slot:
        description: True if artifact should be deployed to staging slot
        type: boolean
        required: false
        default: true
      use_private_agent:
        description: Use a private agent to deploy the built artifact.
        type: boolean
        required: false
        default: true
      use_labels:
        description: Use labels to start the right environment's GitHub runner. If use_labels is true, also use_private_agent must be set to true
        type: boolean
        required: false
        default: true

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch'
    uses: pagopa/dx/.github/workflows/function_app_deploy.yaml@main
    with:
      workspace_name: sm-signature-fn
      environment: app-prod
      resource_group_name: plsm-p-itn-fn-rg-01
      function_app_name: plsm-p-itn-sig-func-01
      use_staging_slot: ${{ inputs.use_staging_slot }}
      use_private_agent: ${{ inputs.use_private_agent }}
      use_labels: ${{ inputs.use_labels }}
      override_labels: prod
    secrets: inherit
