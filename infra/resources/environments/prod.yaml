  prefix: "plsm"
  env_short: "p"
  location: "italynorth"
  instance_number: "01"

# Tags for resource management
tags:
  CostCenter: "TS310 - PAGAMENTI & SERVIZI"
  CreatedBy: "Terraform"
  Environment: "Prod"
  Owner: "PLSM"
  ManagementTeam: "Service Management"
  Source: "https://github.com/pagopa/plsm-service-management/tree/main"

