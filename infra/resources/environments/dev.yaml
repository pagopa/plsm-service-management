# =============================================================================
# Dev Environment Configuration
# =============================================================================
# I blocchi con __local sono processati da infra/scripts/generate_locals.py.
# Le sezioni environment e tags generano yaml_environment e yaml_tags.
# NOTE: Solo valori non-segreti qui. I segreti usano "kv:<terraform_resource_name>"
#       o "res:<espressione terraform>" per risorse gestite da Terraform stesso.

# ─── Metadati ambiente ────────────────────────────────────────────────────────

environment:
  name: "dev"
  prefix: "plsm"
  env_short: "d"
  location: "italynorth"
  instance_number: "01"

# ─── Tag risorse ─────────────────────────────────────────────────────────────

tags:
  CostCenter: "TS310 - PAGAMENTI & SERVIZI"
  CreatedBy: "Terraform"
  Environment: "Dev"
  Owner: "PLSM"
  ManagementTeam: "Service Management"
  Source: "https://github.com/pagopa/plsm-service-management/tree/main"

# =============================================================================
# Sezioni di common.yaml non deployate in DEV — escluse dalla generazione
# =============================================================================

common_app_settings:
  __skip: true # definito manualmente in dev/locals.tf

certificates:
  __skip: true # certificates-fn non deployata in DEV

onboarding:
  __skip: true # onboarding-fn non deployata in DEV

askmebot:
  __skip: true # askmebot-fn non deployata in DEV

# =============================================================================
# Risorse Azure — processate da generate_locals.py (__local = prefisso local TF)
# =============================================================================

# ─── Frontend FE-SMCR (Next.js) ───────────────────────────────────────────────
# Uguale a prod ma con:
#  - URL DEV (plsm-d-*)
#  - Credenziali MSAL dell'app DEV
#  - Segreti DB tramite "res:" (le risorse sono gestite da database.tf nello stesso state)

fe_smcr:
  __local: yaml_fe_smcr
  # ── Segreti KV ──
  FE_SMCR_OCP_APIM_SUBSCRIPTION_KEY_UAT: "kv:fe_smcr_ocp_apim_subscription_key_uat"
  FE_SMCR_API_SLACK_CALL_MANAGEMENT_HOOK_TEST: "kv:fe_smcr_api_slack_call_management_hook_test"
  FE_SMCR_API_SLACK_CALL_MANAGEMENT_HOOK_PROD: "kv:fe_smcr_api_slack_call_management_hook_prod"
  FE_SMCR_USERS_API_KEY: "kv:fe_smcr_users_api_key"
  FE_SMCR_OCP_APIM_SUBSCRIPTION_KEY: "kv:fe_smcr_ocp_apim_subscription_key"
  FE_SMCR_API_KEY_INSTITUTION: "kv:fe_smcr_api_key_institution"
  FE_SMCR_API_KEY_PROD_GET_USERS: "kv:fe_smcr_api_key_prod_get_users"
  FE_SMCR_API_KEY_SERVICES: "kv:fe_smcr_api_key_services"
  FE_SMCR_API_KEY_PNPG: "kv:fe_smcr_api_key_pnpg"
  FE_SMCR_API_KEY_FIRMA_CON_IO: "kv:fe_smcr_api_key_firma_con_io"
  FE_SMCR_SLACK_REPORT_HOOK: "kv:fe_smcr_slack_report_hook"
  FE_SMCR_SLACK_CALL_MANAGEMENT_HOOK: "kv:fe_smcr_slack_call_management_hook"
  FE_SMCR_AZURE_STORAGE_CONNECTION_STRING: "kv:fe_smcr_azure_storage_connection_string"
  FE_SMCR_API_KEY_FIRMA_CON_IO_SIGNER_ID: "kv:fe_smcr_api_key_firma_con_io_signer_id"
  WEBHOOK_MANUAL_STORAGE: "kv:fe_smcr_webhook_manual_storage"
  STORAGE_TOKEN: "kv:fe_smcr_storage_token"
  SLACK_CALL_MANAGEMENT_HOOK_TEST: "kv:fe_smcr_slack_call_management_hook_test"
  SLACK_CALL_MANAGEMENT_HOOK_PROD: "kv:fe_smcr_slack_call_management_hook_prod"
  ONBOARDING_BASE_PATH_UAT: "kv:fe_smcr_onboarding_base_path_uat"
  # MSAL — app registration DEV (diversa da prod)
  NEXT_PUBLIC_MSAL_CLIENT_ID: "kv:fe_smcr_plsm_d_platformsm_client_id:fe-smcr-plsm-d-platformsm-client-id"
  NEXT_PUBLIC_MSAL_TENANT_ID: "kv:fe_smcr_plsm_d_platformsm_tenant_id:fe-smcr-plsm-d-platformsm-tenant-id"
  # DB — gestiti da database.tf nello stesso state Terraform (non passano per data source)
  DB_HOST: "res:azurerm_key_vault_secret.db_host.value"
  DB_USER: "res:azurerm_key_vault_secret.postgres_username.value"
  DB_PASSWORD_B64: "res:azurerm_key_vault_secret.db_password_b64.value"
  # ── Valori non-segreti condivisi ──
  FE_SMCR_AZURE_STORAGE_CONTAINER: "selfcare"
  FE_SMCR_AZURE_STORAGE_ONBOARDING_PRODUCTS_BLOB_PREFIX: "Selfcare_onboarding_mensili_"
  DB_NAME: "dbsmcr"
  DB_TABLE: "dbsmcr"
  DB_PORT: "5432"
  DB_SSL: "true"
  GET_INFOCAMERE: "external/internal/v1/infocamere-pdnd/institution/"
  GET_INSTITUTION: "external/support/v1/institutions"
  GET_IPA: "external/internal/v1/institutions/"
  GET_IPA_UO: "external/internal/v1/uo/"
  GET_IPA_AOO: "external/internal/v1/aoo/"
  GET_STATUS: "external/support/v1/onboarding/institutionOnboardings"
  GET_USERS_PATH: "external/v2/users"
  ONBOARDING_BASE_PATH: "https://api.selfcare.pagopa.it/"
  UPLOAD: "external/internal/v1/onboarding/"
  TEST_ENDPOINT: "mytestendpoint"
  # ── Slot-specifici: URL pubblici DEV ──
  production:
    NEXT_PUBLIC_APP_URL: "https://plsm-d-itn-fe-smcr-app-01.azurewebsites.net"
    NEXT_PUBLIC_MSAL_REDIRECT_URI: "https://plsm-d-itn-fe-smcr-app-01.azurewebsites.net/api/auth/callback/microsoft"
    NEXT_PUBLIC_POST_LOGIN_REDIRECT: "https://plsm-d-itn-fe-smcr-app-01.azurewebsites.net"
  staging:
    NEXT_PUBLIC_APP_URL: "https://plsm-d-itn-fe-smcr-app-01-staging.azurewebsites.net"
    NEXT_PUBLIC_MSAL_REDIRECT_URI: "https://plsm-d-itn-fe-smcr-app-01-staging.azurewebsites.net/api/auth/callback/microsoft"
    NEXT_PUBLIC_POST_LOGIN_REDIRECT: "https://plsm-d-itn-fe-smcr-app-01-staging.azurewebsites.net"

# ─── Auth Function ─────────────────────────────────────────────────────
# Configurazione per MSAL Token Validation in ambiente dev

auth_func:
  __local: yaml_auth_func
  # Segreti da Key Vault (dev usa secrets separati da prod)
  MSAL_CLIENT_ID: "kv:auth_msal_client_id_dev"
  MSAL_TENANT_ID: "kv:auth_msal_tenant_id_dev"
  JWT_SECRET: "kv:auth_jwt_secret_dev"
  # MSAL Redirect URI (production slot)
  MSAL_REDIRECT_URI: "https://plsm-d-itn-auth-func-01.azurewebsites.net/api/v1/auth/callback"
  # Configurazione JWT
  JWT_EXPIRY_SECONDS: "3600"
  JWT_ISSUER: "plsm-auth-service-dev"
  JWT_AUDIENCE: "plsm-fe-smcr-dev"
  # Node.js configuration
  NODE_ENV: "development"
  WEBSITE_RUN_FROM_PACKAGE: "1"
  # Slot staging (per testing)
  staging:
    MSAL_CLIENT_ID: "kv:auth_msal_client_id_dev"
    MSAL_TENANT_ID: "kv:auth_msal_tenant_id_dev"
    JWT_SECRET: "kv:auth_jwt_secret_dev"
    MSAL_REDIRECT_URI: "https://plsm-d-itn-auth-func-01-staging.azurewebsites.net/api/v1/auth/callback"
    JWT_EXPIRY_SECONDS: "3600"
    JWT_ISSUER: "plsm-auth-service-dev-staging"
    JWT_AUDIENCE: "plsm-fe-smcr-dev-staging"
    NODE_ENV: "development"
    WEBSITE_RUN_FROM_PACKAGE: "1"
