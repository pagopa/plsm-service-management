# =============================================================================
# Common Configuration — valori condivisi tra tutti gli ambienti
# =============================================================================
# Queste sezioni top-level (app_insights, database, ecc.) restano per
# eventuali riferimenti futuri.  I blocchi con __local sono quelli processati
# da infra/scripts/generate_locals.py per generare locals_yaml.tf.

# ─── Configurazione condivisa (non-app) ──────────────────────────────────────

app_insights:
  diagnostic_services_extension_version: "~3"
  instrumentation_engine_extension_version: "disabled"
  snapshot_debugger_extension_version: "disabled"
  xdt_microsoft_application_insights_base_extensions: "disabled"
  xdt_microsoft_application_insights_mode: "recommended"
  xdt_microsoft_application_insights_preempt_sdk: "disabled"

common:
  timeout_delay: 300
  website_run_from_package: 1

runtime:
  node_version: 22
  node_env: "production"

health_check:
  path: "/api/v1/health"

database:
  port: 5432
  ssl: true

# =============================================================================
# Risorse Azure — processate da generate_locals.py (__local = prefisso local TF)
# =============================================================================

# ─── App Insights condivisi (iniettati in tutte le app) ──────────────────────

common_app_settings:
  __local: yaml_common
  DiagnosticServices_EXTENSION_VERSION: "~3"
  InstrumentationEngine_EXTENSION_VERSION: "disabled"
  SnapshotDebugger_EXTENSION_VERSION: "disabled"
  XDT_MicrosoftApplicationInsights_BaseExtensions: "disabled"
  XDT_MicrosoftApplicationInsights_Mode: "recommended"
  XDT_MicrosoftApplicationInsights_PreemptSdk: "disabled"
  TIMEOUT_DELAY: "300"

# ─── Certificates Function ───────────────────────────────────────────────────

certificates:
  __local: yaml_certificates_func
  DB_NAME: "certificates"
  DB_TABLE: "certificates"
  DB_PORT: "5432"
  DB_SSL: "true"
  DB_HOST: "kv:db_host"
  DB_USER: "kv:db_user"
  DB_PASSWORD: "kv:db_password"
  # Production = Staging (nessun override per slot)

# ─── Onboarding Function ─────────────────────────────────────────────────────

onboarding:
  __local: yaml_onboarding_func
  CONTRACTS_TOPIC_CONSUMER_GROUP: "$Default"
  CONTRACTS_TOPIC_NAME: "sc-contracts"
  ENDPOINT_GET_INSTITUTION_FROM_TAXCODE: "https://api.selfcare.pagopa.it/external/v2/institutions/?taxCode="
  CONTRACTS_CONSUMER_CONNECTION_STRING: "kv:sc_contracts_conn_string"
  SLACK_WEBHOOK_LOG: "kv:slack_webhook_log"
  SLACK_WEBHOOK_ONBOARDING_IO: "kv:slack_webhook_onboarding_io"
  SLACK_WEBHOOK_ONBOARDING_IO_PREMIUM: "kv:slack_webhook_onboarding_io_premium"
  SLACK_WEBHOOK_ONBOARDING_PN: "kv:slack_webhook_onboarding_pn"
  SLACK_WEBHOOK_ONBOARDING_INTEROP: "kv:slack_webhook_onboarding_interop"
  SLACK_WEBHOOK_ONBOARDING_PAGOPA: "kv:slack_webhook_onboarding_pagopa"
  OCP_APIM_SUBSCRIPTION_KEY: "kv:ocp_apim_subscription_key"
  # Staging ha 2 extra rispetto a production
  staging:
    CONTRACTS_TOPIC_CONSUMER_GROUP: "$Default"
    CONTRACTS_TOPIC_NAME: "sc-contracts"
    ENDPOINT_GET_INSTITUTION_FROM_TAXCODE: "https://api.selfcare.pagopa.it/external/v2/institutions/?taxCode="
    CONTRACTS_CONSUMER_CONNECTION_STRING: "kv:sc_contracts_conn_string"
    SLACK_WEBHOOK_LOG: "kv:slack_webhook_log"
    SLACK_WEBHOOK_ONBOARDING_IO: "kv:slack_webhook_onboarding_io"
    SLACK_WEBHOOK_ONBOARDING_IO_PREMIUM: "kv:slack_webhook_onboarding_io_premium"
    SLACK_WEBHOOK_ONBOARDING_PN: "kv:slack_webhook_onboarding_pn"
    SLACK_WEBHOOK_ONBOARDING_INTEROP: "kv:slack_webhook_onboarding_interop"
    SLACK_WEBHOOK_ONBOARDING_PAGOPA: "kv:slack_webhook_onboarding_pagopa"
    APPINSIGHTS_INSTRUMENTATIONKEY: "kv:appinsights_instrumentationkey"
    FE_SMCR_OCP_APIM_SUBSCRIPTION_KEY: "kv:FE_SMCR_OCP_APIM_SUBSCRIPTION_KEY"

# ─── Ask Me Bot Function ─────────────────────────────────────────────────────

askmebot:
  __local: yaml_askmebot_func
  SERVICENAME: "Ask Me Bot"
  SLACK_API_URL: "https://slack.com/api"
  INSTITUTION_URL: "https://api.selfcare.pagopa.it/external/support/v1/institutions"
  USERS_URL: "https://api.selfcare.pagopa.it/external/internal/v1/institutions"
  CONTRACT_URL: "https://api.selfcare.pagopa.it/external/support/v1/institutions"
  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  SMTP_SECURE: "false"
  SMTP_USERNAME: "noreply@pagopa.it"
  FROM_EMAIL: "noreply@pagopa.it"
  CCN_EMAIL: "Bot_Selfcare@pagopa.it"
  MAX_DATA_LENGTH: "10"
  APPINSIGHTS_SAMPLING_PERCENTAGE: "5"
  SLACK_BOT_TOKEN: "kv:askmebot_slack_bot_token"
  SLACK_SIGNING_SECRET: "kv:askmebot_slack_signing_secret"
  ENABLED_EMAILS_SECRET: "kv:askmebot_enabled_emails_secret"
  LEGAL_ENABLED_EMAILS_SECRET: "kv:askmebot_legal_enabled_emails_secret"
  USERS_APIM_SUBSCRIPTION_KEY: "kv:askmebot_users_apim_subscription_key"
  CONTRACT_APIM_SUBSCRIPTION_KEY: "kv:askmebot_contract_apim_subscription_key"
  SMTP_PASSWORD: "kv:askmebot_smtp_password"
  APPINSIGHTS_CONNECTION_STRING: "kv:appinsights_connection_string"
  APPINSIGHTS_INSTRUMENTATIONKEY: "kv:appinsights_instrumentationkey"
  # Production e staging usano segreti KV diversi per FE_SMCR_OCP_APIM_SUBSCRIPTION_KEY
  production:
    NODE_ENV: "production"
    FE_SMCR_OCP_APIM_SUBSCRIPTION_KEY: "kv:askmebot_FE_SMCR_OCP_APIM_SUBSCRIPTION_KEY"
  staging:
    NODE_ENV: "production"
    FE_SMCR_OCP_APIM_SUBSCRIPTION_KEY: "kv:askmebot_ocp_apim_subscription_key"

# ─── Auth Function ─────────────────────────────────────────────────────

auth_func:
  __local: yaml_auth_func
